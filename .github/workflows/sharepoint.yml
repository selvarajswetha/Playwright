name: Run Playwright from SharePoint

on:
  workflow_dispatch:
    inputs:
      fileName:
        description: "SharePoint File Name"
        required: true
        type: string

      filePath:
        description: "SharePoint File Path"
        required: true
        type: string

jobs:
  playwright:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Display Inputs
        run: |
          echo "File Name: ${{ github.event.inputs.fileName }}"
          echo "File Path: ${{ github.event.inputs.filePath }}"

      - name: Run Playwright
        env:
          FILE_NAME: ${{ github.event.inputs.fileName }}
          FILE_PATH: ${{ github.event.inputs.filePath }}
        run: npx playwright test

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          if-no-files-found: ignore
